<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>錢途無量</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>錢途無量</h1>

    <nav aria-label="主選單">
      <button class="tab active" data-page="accountingPage" type="button">記帳</button>
      <button class="tab" data-page="salaryPage" type="button">記薪</button>
      <button class="tab" data-page="walletPage" type="button">帳戶</button>
    </nav>
  </header>

  <main id="accountingPage" class="page active">
    <section class="card calendar-card">
      <div class="calendar-fixed">
        <div class="summary">
          <span id="incomeSummary" class="income">收入 NT$0</span>
          <span id="expenseSummary" class="expense">支出 NT$0</span>
          <span id="balanceSummary" class="balance">結餘 NT$0</span>
        </div>

        <div class="month-control">
          <button id="prevMonth" type="button" aria-label="上一月">&lt;</button>
          <input type="month" id="monthPicker" aria-label="選擇月份" />
          <button id="nextMonth" type="button" aria-label="下一月">&gt;</button>
        </div>

        <div class="weekdays" aria-hidden="true">
          <span>日</span>
          <span>一</span>
          <span>二</span>
          <span>三</span>
          <span>四</span>
          <span>五</span>
          <span>六</span>
        </div>

        <div id="calendar" class="calendar"></div>
      </div>

    </section>

    <section class="card detail-card">
      <div class="card-title-row">
        <h2>明細</h2>
        <button id="showTransactionFormBtn" class="icon-btn" type="button" aria-label="新增記帳">+</button>
      </div>

      <form id="transactionForm" class="inline-form hidden">
        <input type="date" id="dateInput" required aria-label="日期" />

        <select id="typeInput" aria-label="收支類型">
          <option value="收入">收入</option>
          <option value="支出">支出</option>
        </select>

        <div class="select-add">
          <select id="categoryInput" aria-label="類別"></select>
          <div id="categoryAddBox" class="add-box hidden">
            <input type="text" id="newCategoryInput" placeholder="新增類別名稱" />
            <button type="button" id="addCategoryBtn">新增</button>
          </div>
        </div>

        <input type="number" id="amountInput" min="1" step="1" placeholder="金額" required />

        <div class="select-add">
          <select id="accountInput" aria-label="帳戶"></select>
          <div id="accountAddBox" class="add-box hidden">
            <input type="text" id="newAccountInput" placeholder="新增帳戶名稱" />
            <select id="newAccountTypeInput" aria-label="帳戶類別">
              <option value="cash">現金</option>
              <option value="debit">銀行帳戶</option>
              <option value="credit">信用卡</option>
            </select>
            <input type="number" id="newAccountBalanceInput" step="1" placeholder="初始金額" />
            <div id="newAccountCreditFields" class="split-row hidden">
              <input type="number" id="newAccountStatementDayInput" min="1" max="31" step="1" placeholder="結帳日" />
              <input type="number" id="newAccountPaymentDayInput" min="1" max="31" step="1" placeholder="繳款日" />
            </div>
            <button type="button" id="addAccountBtn">新增</button>
          </div>
        </div>

        <div class="select-add tag-select">
          <button id="tagDropdownBtn" class="dropdown-btn" type="button" aria-expanded="false">選擇標籤</button>
          <div id="tagChoices" class="tag-choices hidden" aria-label="標籤"></div>
        </div>

        <input type="text" id="noteInput" placeholder="備註" />

        <button type="submit" class="submit-btn">新增</button>
      </form>

      <div id="historyList" class="history-list"></div>
    </section>

    <section class="card insight-card">
      <div class="segmented-control">
        <button id="reportViewBtn" class="active" type="button">報表</button>
        <button id="tagViewBtn" type="button">標籤</button>
      </div>

      <div id="reportPanel" class="insight-panel">
        <div class="chart-toolbar" aria-label="報表類型">
          <button class="chart-btn active" data-chart="pie" type="button">圓餅圖</button>
          <button class="chart-btn" data-chart="line" type="button">折線圖</button>
          <button class="chart-btn" data-chart="bar" type="button">長條圖</button>
        </div>
        <div class="chart-toolbar chart-flow-toolbar" aria-label="收支切換">
          <button class="chart-flow-btn active" data-flow="收入" type="button">收入</button>
          <button class="chart-flow-btn" data-flow="支出" type="button">支出</button>
        </div>
        <canvas id="accountingChart" class="chart-canvas"></canvas>
      </div>

      <div id="tagPanel" class="insight-panel hidden">
        <h2>標籤統計</h2>
        <div id="tagSummaryList" class="history-list"></div>
      </div>
    </section>
  </main>

  <main id="salaryPage" class="page salary-layout">
    <section class="card salary-calendar-card">
      <div class="salary-calendar-top">
        <div class="salary-view-toggle segmented-control">
          <button id="salaryHoursViewBtn" class="active" type="button">工作時間</button>
          <button id="salaryAmountViewBtn" type="button">日薪</button>
        </div>
      </div>

      <div class="month-control">
        <button id="prevSalaryMonth" type="button" aria-label="上一月">&lt;</button>
        <input type="month" id="salaryMonthPicker" aria-label="選擇記薪月份" />
        <button id="nextSalaryMonth" type="button" aria-label="下一月">&gt;</button>
      </div>

      <div class="weekdays" aria-hidden="true">
        <span>日</span>
        <span>一</span>
        <span>二</span>
        <span>三</span>
        <span>四</span>
        <span>五</span>
        <span>六</span>
      </div>

      <div id="salaryCalendar" class="calendar"></div>

    </section>

    <section class="card form-card">
      <div class="card-title-row">
        <h2>薪水收入明細</h2>
        <button id="showSalaryFormBtn" class="icon-btn" type="button" aria-label="新增記薪">+</button>
      </div>
      <div id="salaryDayList" class="history-list"></div>
      <form id="salaryForm" class="inline-form hidden">
        <div class="split-row">
          <input type="date" id="salaryStartDateInput" required aria-label="上班日期" />
          <input type="date" id="salaryEndDateInput" required aria-label="下班日期" />
        </div>
        <div class="time-row">
          <input type="text" id="salaryStartInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="上班時間 0900" required />
          <input type="text" id="salaryEndInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="下班時間 1800" required />
        </div>
        <input type="number" id="salaryBreakInput" min="0" step="0.5" placeholder="休息時數，例如 0.5" />
        <input type="number" id="salaryRateInput" min="1" step="1" placeholder="時薪" required />
        <input type="text" id="salaryNoteInput" placeholder="備註" />
        <button type="submit" class="submit-btn">新增</button>
      </form>
    </section>

    <section class="card salary-summary-card">
      <h2>薪資設定</h2>
      <form id="salarySettingsForm" class="settings-form">
        <div class="split-row">
          <label>
            <span>起算日</span>
            <input type="number" id="salaryStartDayInput" min="1" max="31" step="1" />
          </label>
          <label>
            <span>結算日</span>
            <input type="number" id="salaryEndDayInput" min="1" max="31" step="1" />
          </label>
        </div>
        <label>
          <span>發薪日</span>
          <input type="number" id="salaryPayDayInput" min="1" max="31" step="1" />
        </label>
        <button type="submit" class="submit-btn">儲存設定</button>
      </form>

      <div class="metric-list">
        <div>
          <span>本期總時數</span>
          <strong id="salaryHoursSummary">0 小時</strong>
        </div>
        <div>
          <span>本期薪資</span>
          <strong id="salaryAmountSummary">NT$0</strong>
        </div>
        <div>
          <span>發薪日</span>
          <strong id="salaryPayDateSummary">--</strong>
        </div>
      </div>
    </section>
  </main>

  <main id="walletPage" class="page wallet-layout">
    <section class="card wallet-summary">
      <h2>帳戶總覽</h2>
      <p id="walletTotal" class="wallet-total">NT$0</p>
      <div class="metric-list compact-metrics">
        <div>
          <span>信用卡負債</span>
          <strong id="walletDebtTotal">NT$0</strong>
        </div>
      </div>
      <div class="wallet-report">
        <h2>帳戶餘額走勢</h2>
        <canvas id="walletBalanceChart" class="chart-canvas small-chart"></canvas>
      </div>
    </section>

    <section class="card account-card">
      <div class="card-title-row">
        <h2>帳戶管理</h2>
        <button id="showWalletFormBtn" class="icon-btn" type="button" aria-label="新增帳戶">+</button>
      </div>
      <form id="walletForm" class="inline-form hidden">
        <input type="text" id="walletNameInput" placeholder="帳戶名稱" required />
        <select id="walletTypeInput" required aria-label="帳戶類別">
          <option value="cash">現金</option>
          <option value="debit">銀行帳戶</option>
          <option value="credit">信用卡</option>
        </select>
        <div id="creditDateFields" class="split-row hidden">
          <input type="number" id="walletStatementDayInput" min="1" max="31" step="1" placeholder="出帳日" />
          <input type="number" id="walletPaymentDayInput" min="1" max="31" step="1" placeholder="還款日" />
        </div>
        <input type="number" id="walletBalanceInput" step="1" placeholder="初始餘額" required />
        <button type="submit" class="submit-btn">新增</button>
      </form>
      <div id="walletList" class="history-list"></div>
    </section>

    <section class="card history-card">
      <div class="card-title-row">
        <h2 id="walletDetailTitle">明細</h2>
        <button id="editWalletBtn" class="secondary-btn" type="button">編輯帳戶</button>
      </div>
      <div id="walletDetailList" class="history-list"></div>
    </section>
  </main>

  <div id="chartTooltip" class="chart-tooltip hidden" role="status"></div>

  <dialog id="detailDialog" class="detail-dialog">
    <div class="dialog-title-row">
      <h2 id="detailDialogTitle">明細資訊</h2>
      <div class="dialog-actions">
        <button id="editDetailBtn" class="secondary-btn" type="button">編輯</button>
        <button id="deleteDetailBtn" class="danger-btn" type="button">刪除</button>
        <button id="closeDetailBtn" class="icon-btn" type="button" aria-label="關閉">×</button>
      </div>
    </div>
    <div id="detailView"></div>
    <form id="detailEditForm" class="dialog-form hidden"></form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
